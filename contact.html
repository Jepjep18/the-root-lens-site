    <section class="section contact" data-section="section7">
      <div class="container">
        <div class="row">
          <div class="col-md-12">
            <div class="section-heading">
              <h2>Let's Keep In Touch</h2>
              <p class="section-subtitle">Reach out for inquiries, collaborations, submissions, or any message you would like to share with the publication team.</p>
            </div>
          </div>
          <div class="col-md-6">
            <form id="contact" action="" method="post">
              <div class="row">
                <div class="col-md-6">
                  <fieldset>
                    <input name="name" type="text" class="form-control" id="name" placeholder="Your Name" required="">
                  </fieldset>
                </div>
                <div class="col-md-6">
                  <fieldset>
                    <input name="email" type="text" class="form-control" id="email" placeholder="Your Email" required="">
                  </fieldset>
                </div>
                <div class="col-md-12">
                  <fieldset>
                    <textarea name="message" rows="6" class="form-control" id="message" placeholder="Your message..." required=""></textarea>
                  </fieldset>
                </div>
                <div class="col-md-12">
                  <fieldset>
                    <button type="submit" id="form-submit" class="button">Send Message Now</button>
                  </fieldset>
                </div>
              </div>
            </form>
          </div>
          <div class="col-md-6">
            <div id="map">
              <iframe src="https://maps.google.com/maps?q=Dr.%20Santiago%20Dakudao%20Sr.%20NHS%2C%205J6V%2B85M%2C%20Malagamot%20Rd%2C%20Bunawan%2C%20Davao%20City%2C%20Davao%20del%20Sur%2C%20Philippines&t=&z=17&ie=UTF8&iwloc=&output=embed" width="100%" height="422px" frameborder="0" style="border:0" allowfullscreen></iframe>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <div class="footer-banner footer-banner-image">
        <img src="assets/images/root-lens-footer.jpg" alt="The Root Lens footer banner">
      </div>
